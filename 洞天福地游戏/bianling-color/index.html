<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>辨灵试色</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0e1218;
      --panel: #171e27;
      --line: rgba(255,255,255,.12);
      --text: #f4f0e8;
      --muted: #aeb8c4;
      --accent: #8dd7ff;
      --accent-2: #ffd36a;
      --bad: #ff8c8c;
    }

    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }
    body {
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(141, 215, 255, .18), transparent 34%),
        linear-gradient(180deg, #121924 0%, #0d121a 55%, #080b11 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
    }
    main {
      width: 100vw;
      max-width: 620px;
      height: 100dvh;
      min-height: 0;
      margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) 16px max(12px, env(safe-area-inset-bottom));
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto auto;
      gap: 12px;
      overflow: hidden;
    }
    .top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-end; }
    h1 { margin: 0 0 4px; font-size: clamp(28px, 7vw, 42px); line-height: 1; letter-spacing: 0; }
    .sub { margin: 0; color: var(--muted); font-size: 14px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .stat { padding: 10px 6px; border: 1px solid var(--line); background: var(--panel); border-radius: 8px; text-align: center; }
    .stat b { display: block; font-size: 20px; color: var(--accent); }
    .stat span { color: var(--muted); font-size: 12px; }
    .grid {
      display: grid;
      gap: 6px;
      width: min(560px, 100%);
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      touch-action: manipulation;
      place-self: center;
    }
    .cell {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      min-width: 0;
      min-height: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
      transition: transform .08s ease, filter .12s ease, box-shadow .12s ease;
    }
    .cell:active { transform: scale(.97); }
    .cell.correct { transform: scale(.92); filter: saturate(1.45) brightness(1.18); box-shadow: 0 0 18px rgba(141, 215, 255, .28); }
    .cell.miss { transform: scale(.94); filter: grayscale(.3) brightness(.8); box-shadow: 0 0 18px rgba(255, 140, 140, .26); }
    .grid.input-locked .cell { cursor: wait; filter: saturate(.88) brightness(.92); }
    .empty {
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      text-align: center;
      padding: 24px;
      line-height: 1.7;
    }
    .actions { display: flex; gap: 10px; }
    button.action {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #061018;
      font-weight: 800;
      padding: 12px 16px;
      min-height: 44px;
      cursor: pointer;
      flex: 1;
    }
    button.action.secondary { background: #202a35; color: var(--text); border: 1px solid var(--line); }
    button.action:disabled { opacity: .55; cursor: not-allowed; }
    .result {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(5, 8, 12, .68);
      backdrop-filter: blur(8px);
    }
    .result.show { display: grid; }
    .result-card {
      width: min(430px, 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #171e27;
      padding: 18px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, .42);
    }
    .result-card h2 { margin: 0 0 8px; font-size: 24px; }
    .result-desc { margin: 0 0 12px; color: var(--muted); line-height: 1.6; }
    .code-label { color: var(--muted); font-size: 12px; font-weight: 800; }
    .code {
      margin-top: 4px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(0,0,0,.24);
      font-size: 20px;
      font-weight: 900;
      color: var(--accent-2);
      word-break: break-all;
    }
    .command {
      margin-top: 8px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-weight: 800;
      word-break: break-all;
    }
    .rewards { margin: 8px 0 0; padding-left: 18px; color: var(--muted); }
    .copy-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
    .result-card > .action { margin-top: 8px; width: 100%; }
    .error { color: var(--bad); }
    .inline-status {
      min-height: 22px;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
      display: grid;
      align-items: center;
    }

    @media (hover: none) and (pointer: coarse), (max-width: 640px) {
      main {
        width: 100%;
        height: 100%;
        padding: max(8px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
        grid-template-rows: auto auto minmax(0, 1fr) auto auto;
        gap: 8px;
      }
      .top {
        display: grid;
        grid-template-columns: 1fr;
        align-items: center;
        margin-bottom: 0;
      }
      h1 { font-size: clamp(25px, 8vw, 34px); }
      .sub { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .stats { grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 0; }
      .stat { padding: 7px 3px; border-radius: 7px; }
      .stat b { font-size: clamp(16px, 5vw, 20px); }
      .stat span { font-size: 11px; }
      .grid {
        width: min(calc(100vw - 20px), calc(100dvh - 214px));
        max-width: 100%;
        gap: 4px;
        align-self: center;
      }
      .cell { border-radius: 6px; }
      .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-top: 0; }
      button.action { min-height: 50px; padding: 10px 12px; font-size: 15px; }
      .inline-status { min-height: 32px; font-size: 12px; }
      .copy-actions { grid-template-columns: 1fr 1fr; }
      .result {
        align-items: end;
        padding: 12px max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      }
      .result-card {
        width: 100%;
        max-height: calc(100dvh - 24px);
        overflow-y: auto;
        border-radius: 12px;
      }
    }

    @media (max-height: 620px) {
      main { gap: 6px; }
      h1 { font-size: 24px; }
      .sub { display: none; }
      .stat { padding: 5px 3px; }
      .stat b { font-size: 16px; }
      .grid { width: min(calc(100vw - 16px), calc(100dvh - 166px)); gap: 3px; }
      button.action { min-height: 44px; }
    }

    @media (max-width: 360px) {
      .actions { gap: 5px; }
      button.action { min-height: 46px; padding: 8px 6px; font-size: 13px; }
      .stat span { font-size: 10px; }
      .grid { width: min(calc(100vw - 18px), calc(100dvh - 204px)); }
    }
  </style>
</head>
<body>
  <main>
    <section class="top">
      <div>
        <h1>辨灵试色</h1>
        <p class="sub">60 秒辨尽 52 阶灵色。</p>
      </div>
    </section>

    <section class="stats" aria-live="polite">
      <div class="stat"><b id="time">60</b><span>剩余</span></div>
      <div class="stat"><b id="level">0</b><span>层数</span></div>
      <div class="stat"><b id="layer">0</b><span>难层</span></div>
      <div class="stat"><b id="mistakes">0</b><span>误触</span></div>
    </section>

    <section class="grid" id="grid" aria-label="辨灵色阵"></section>

    <section class="actions">
      <button class="action" id="start" type="button" disabled>开局</button>
      <button class="action secondary" id="finish" type="button" disabled>结算本局</button>
      <button class="action secondary" id="restart" type="button" disabled>重开</button>
    </section>
    <p class="inline-status" id="status">正在叩问洞天入口。</p>

    <section class="result" id="result" aria-live="polite"></section>
  </main>

  <script src="../no-select-guard.js"></script>
  <script>
    const API = "/xiuxian/dongtian/bianling-color";
    const state = {
      config: null,
      round: null,
      stages: [],
      index: 0,
      mistakes: 0,
      startedAt: 0,
      timer: null,
      finished: false,
      duration: 60,
      minSettleSeconds: 10,
      levelCap: 52,
      mistakeCap: 10,
      mistakePenaltyMs: 260,
      correctAdvanceMs: 110,
      pendingFinishTimer: null,
      resolving: false
    };

    const els = {
      grid: document.getElementById("grid"),
      start: document.getElementById("start"),
      finish: document.getElementById("finish"),
      restart: document.getElementById("restart"),
      time: document.getElementById("time"),
      level: document.getElementById("level"),
      layer: document.getElementById("layer"),
      mistakes: document.getElementById("mistakes"),
      result: document.getElementById("result"),
      status: document.getElementById("status")
    };

    async function request(path, options = {}) {
      const res = await fetch(API + path, {
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        ...options
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "洞天接口暂时没有回应");
      return data;
    }

    async function loadConfig() {
      try {
        state.config = await request("/config", { method: "GET", headers: undefined });
        state.duration = Number(state.config.config?.game_duration || 60);
        state.minSettleSeconds = Number(state.config.config?.round_min_seconds || 10);
        state.levelCap = Number(state.config.config?.level_cap || state.levelCap);
        state.mistakeCap = Number(state.config.config?.mistake_cap || state.mistakeCap);
        state.mistakePenaltyMs = Number(state.config.config?.mistake_penalty_ms || state.mistakePenaltyMs);
        state.correctAdvanceMs = Number(state.config.config?.correct_advance_ms || state.correctAdvanceMs);
        els.start.disabled = false;
        els.restart.disabled = false;
        setStatus("洞天凭证已就绪。");
        updateStats();
      } catch (err) {
        els.start.disabled = true;
        els.restart.disabled = true;
        setStatus("洞天凭证获取失败，请稍后重进。");
      }
    }

    async function startGame() {
      if (!state.config?.game_token) {
        setStatus("洞天凭证还没准备好，请稍等。");
        return;
      }
      clearTimeout(state.pendingFinishTimer);
      clearResult();
      setStatus("正在开局。");
      els.start.disabled = true;
      els.restart.disabled = true;
      try {
        state.round = await request("/start", {
          method: "POST",
          body: JSON.stringify({ gameToken: state.config.game_token })
        });
      } catch (err) {
        els.start.disabled = false;
        els.restart.disabled = false;
        setStatus(err.message || "开局失败，请稍后再试。");
        showError(err.message || "开局失败，请稍后再试。");
        return;
      }
      state.stages = state.round.stages || [];
      state.levelCap = Number(state.round.level_cap || state.config.config?.level_cap || state.stages.length || state.levelCap);
      state.mistakeCap = Number(state.round.mistake_cap || state.config.config?.mistake_cap || state.mistakeCap);
      state.mistakePenaltyMs = Number(state.round.mistake_penalty_ms || state.config.config?.mistake_penalty_ms || state.mistakePenaltyMs);
      state.correctAdvanceMs = Number(state.round.correct_advance_ms || state.config.config?.correct_advance_ms || state.correctAdvanceMs);
      state.index = 0;
      state.mistakes = 0;
      state.startedAt = Date.now();
      state.finished = false;
      state.resolving = false;
      els.start.disabled = true;
      els.restart.disabled = false;
      els.finish.disabled = false;
      setStatus(`60 秒内辨尽 ${state.levelCap} 阶灵色。`);
      renderStage();
      tick();
      clearInterval(state.timer);
      state.timer = setInterval(tick, 500);
    }

    function renderStage() {
      const stage = state.stages[state.index];
      if (!stage) {
        els.grid.innerHTML = '<div class="empty">本局灵色已经辨尽，等待归档。</div>';
        els.grid.style.gridTemplateColumns = "1fr";
        updateStats();
        return;
      }
      els.grid.innerHTML = "";
      els.grid.style.gridTemplateColumns = `repeat(${stage.size}, 1fr)`;
      const count = stage.size * stage.size;
      for (let i = 0; i < count; i += 1) {
        const cell = document.createElement("button");
        cell.className = "cell";
        cell.type = "button";
        cell.style.background = i === stage.target_index ? stage.target : stage.base;
        cell.setAttribute("aria-label", i === stage.target_index ? "灵气偏色" : "普通色块");
        cell.addEventListener("click", () => choose(i));
        els.grid.appendChild(cell);
      }
      updateStats();
    }

    function choose(index) {
      if (!state.startedAt || state.finished || state.resolving) return;
      const stage = state.stages[state.index];
      if (!stage) return;
      const cell = els.grid.children[index];
      if (index === stage.target_index) {
        state.resolving = true;
        els.grid.classList.add("input-locked");
        cell?.classList.add("correct");
        window.setTimeout(() => {
          if (state.finished) return;
          state.index += 1;
          state.resolving = false;
          els.grid.classList.remove("input-locked");
          renderStage();
        }, state.correctAdvanceMs);
      } else {
        state.mistakes += 1;
        state.resolving = true;
        els.grid.classList.add("input-locked");
        cell?.classList.add("miss");
        updateStats();
        window.setTimeout(() => {
          cell?.classList.remove("miss");
          state.resolving = false;
          els.grid.classList.remove("input-locked");
        }, state.mistakePenaltyMs);
      }
    }

    function tick() {
      const left = Math.max(0, state.duration - elapsedSeconds());
      els.time.textContent = String(left);
      if (left <= 0 && state.startedAt && !state.finished) finishGame("timeout");
    }

    function elapsedSeconds() {
      if (!state.startedAt) return 0;
      return Math.min(state.duration, Math.floor((Date.now() - state.startedAt) / 1000));
    }

    function highestLayer() {
      if (state.index <= 0) return 0;
      const lastStage = state.stages[state.index - 1];
      return lastStage ? Number(lastStage.layer || 0) : 0;
    }

    function updateStats() {
      els.level.textContent = `${state.index}/${state.levelCap || state.stages.length || 0}`;
      els.layer.textContent = String(highestLayer());
      els.mistakes.textContent = `${state.mistakes}/${state.mistakeCap}`;
      els.time.textContent = String(Math.max(0, state.duration - elapsedSeconds()));
    }

    async function finishGame(reason = "manual") {
      if (!state.round || state.finished) return;
      const wait = secondsUntilSettleReady();
      if (wait > 0) {
        setStatus(`灵气还没完全归档，还需 ${wait} 秒后才能结算。`);
        if (reason !== "manual") {
          clearTimeout(state.pendingFinishTimer);
          state.pendingFinishTimer = setTimeout(() => finishGame(reason), wait * 1000 + 80);
        }
        return;
      }
      state.finished = true;
      state.resolving = false;
      els.grid.classList.remove("input-locked");
      clearInterval(state.timer);
      els.start.disabled = true;
      els.restart.disabled = true;
      els.finish.disabled = true;
      setStatus("正在向洞天校验本局成绩。");
      updateStats();
      for (const cell of els.grid.children) cell.disabled = true;
      try {
        const payload = {
          gameToken: state.config.game_token,
          sessionId: state.round.session_id,
          roundToken: state.round.round_token,
          levelsPassed: state.index,
          mistakes: state.mistakes,
          elapsedSeconds: elapsedSeconds(),
          highestLayer: highestLayer()
        };
        const issued = await request("/finish", { method: "POST", body: JSON.stringify(payload) });
        showResult(issued);
      } catch (err) {
        state.finished = false;
        els.start.disabled = true;
        els.restart.disabled = true;
        els.finish.disabled = false;
        if (isTooEarlyError(err)) {
          setStatus(err.message || "本局结束过快，请稍后再结算。");
          renderStage();
          return;
        }
        showError(`${err.message || "结算失败"}，可以重试结算本局。`, true);
      }
    }

    function secondsUntilSettleReady() {
      const minSeconds = Math.max(0, Number(state.minSettleSeconds || 0));
      return Math.max(0, minSeconds - elapsedSeconds());
    }

    function isTooEarlyError(error) {
      return String(error?.message || "").includes("结束过快");
    }

    function setStatus(text) {
      els.status.textContent = text;
    }

    function showResult(issued) {
      const code = issued.code || "";
      const acceptedLevels = Number(issued.levels_passed ?? state.index);
      const acceptedLayer = Number(issued.highest_layer ?? highestLayer());
      const acceptedMistakes = Number(issued.mistakes ?? state.mistakes);
      const acceptedScore = Number(issued.accepted_score ?? 0);
      const rewards = (issued.reward_preview || []).map(item => `<li>${escapeHtml(item)}</li>`).join("") || "<li>本局没有生成可兑换奖励。</li>";
      els.start.disabled = false;
      els.restart.disabled = false;
      els.finish.disabled = true;
      setStatus("兑换码十分钟内有效。");
      els.result.className = "result show";
      els.result.innerHTML = `
        <div class="result-card" role="dialog" aria-modal="true" aria-label="辨灵试色结算">
          <h2>辨灵收束</h2>
          <p class="result-desc">认可 ${acceptedScore} 分｜过 ${acceptedLevels} 层｜最高难层 ${acceptedLayer}｜误触 ${acceptedMistakes}。兑换码十分钟内有效。</p>
          <div class="code-label">洞天兑换码</div>
          <div class="code">${escapeHtml(code)}</div>
          <div class="command">洞天兑换 ${escapeHtml(code)}</div>
          <ul class="rewards">${rewards}</ul>
          <div class="copy-actions">
            <button class="action" type="button" id="copyCommand">复制兑换命令</button>
            <button class="action secondary" type="button" id="copyCode">复制兑换码</button>
          </div>
          <button class="action secondary" type="button" id="againFromResult">再来一局</button>
        </div>
      `;
      document.getElementById("copyCommand").addEventListener("click", event => copyText(event.currentTarget, `洞天兑换 ${code}`, "已复制兑换命令"));
      document.getElementById("copyCode").addEventListener("click", event => copyText(event.currentTarget, code, "已复制兑换码"));
      document.getElementById("againFromResult").addEventListener("click", () => startGame().catch(err => showError(err.message)));
    }

    function showError(message, retry = false) {
      els.result.className = "result show";
      els.result.innerHTML = `
        <div class="result-card" role="dialog" aria-modal="true" aria-label="辨灵试色结算异常">
          <h2>结算受阻</h2>
          <div class="error">${escapeHtml(message)}</div>
          ${retry ? '<button class="action" type="button" id="retryFinish">结算本局</button>' : '<button class="action secondary" type="button" id="closeResult">知道了</button>'}
        </div>
      `;
      if (retry) {
        document.getElementById("retryFinish")?.addEventListener("click", () => finishGame("manual"));
      } else {
        document.getElementById("closeResult")?.addEventListener("click", clearResult);
      }
    }

    function clearResult() {
      els.result.className = "result";
      els.result.innerHTML = "";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    async function copyText(button, text, copiedText) {
      const original = button.textContent;
      try {
        await writeClipboard(text);
        button.textContent = copiedText;
      } catch {
        button.textContent = "请长按复制";
      }
      window.setTimeout(() => { button.textContent = original; }, 1600);
    }

    async function writeClipboard(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const area = document.createElement("textarea");
      area.value = text;
      area.style.position = "fixed";
      area.style.opacity = "0";
      document.body.appendChild(area);
      area.focus();
      area.select();
      document.execCommand("copy");
      area.remove();
    }

    els.start.addEventListener("click", () => startGame().catch(err => showError(err.message)));
    els.restart.addEventListener("click", () => startGame().catch(err => showError(err.message)));
    els.finish.addEventListener("click", () => finishGame("manual"));
    loadConfig();
  </script>
</body>
</html>
